name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p _site
          cp index.html robots.txt sitemap.xml _site/

      - name: Replace placeholder domain with real Pages URL
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          echo "Using site URL: $SITE_URL"
          # Strip trailing slash for places that shouldn't double up on it (sitemap <loc>, robots Sitemap: keep trailing slash form is fine too)
          find _site -type f \( -name "*.html" -o -name "*.xml" -o -name "*.txt" \) -print0 \
            | xargs -0 sed -i "s#https://example.com/#${SITE_URL}#g"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
